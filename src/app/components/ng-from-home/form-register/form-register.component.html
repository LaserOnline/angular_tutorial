<body>
  <div class="container mt-5">
    <form class="content" [formGroup]="registerForm" (ngSubmit)="submitData()">
      <h1 class="text-center">Register Form</h1>
      <div class="row">
        <div class="mt-2 mb-2 col-lg-6 col-6">
          <input
            type="text"
            formControlName="firstName"
            class="form-control"
            placeholder="Name"
          />
          <div
            *ngIf="firstname.invalid && (firstname.touched || firstname.dirty)"
          >
            <span class="error" *ngIf="firstname.errors?.required"
              >First Name is Required</span
            >
            <span class="error" *ngIf="firstname.errors?.pattern"
              >Enter only Characters</span
            >
          </div>
        </div>

        <div class="mt-2 mb-2 col-lg-6 col-6">
          <input
            type="text"
            formControlName="lastname"
            class="form-control"
            placeholder="Last Name"
          />
          <div *ngIf="lastname.invalid && (lastname.touched || lastname.dirty)">
            <span class="error" *ngIf="lastname.errors?.required"
              >Last Name is Required</span
            >
            <span class="error" *ngIf="lastname.errors?.pattern"
              >Enter only Characters</span
            >
          </div>
        </div>
        <div class="mt-2 mb-2 col-lg-12 col-12">
          <input
            type="text"
            formControlName="email"
            class="form-control"
            placeholder="Email ID"
          />
          <div
            class="error"
            *ngIf="email.invalid && (email.touched || email.dirty)"
          >
            <span class="error" *ngIf="email.errors?.required"
              >Email is Required</span
            >
            <span class="error" *ngIf="email.errors?.email"
              >Email ไม่ถูกต้อง</span
            >
          </div>
        </div>

        <div class="mt-2 mb-2 col-lg-12 col-12">
          <input
            type="text"
            formControlName="mobileNumber"
            class="form-control"
            placeholder="Mobile Number"
          />
          <div *ngIf="mobileNumber.invalid && mobileNumber.touched">
            <span class="error" *ngIf="mobileNumber.errors?.required"
              >Mobile is Required</span
            >
            <span class="error" *ngIf="mobileNumber.errors?.pattern"
              >Enter Number</span
            >
          </div>
        </div>

        <div class="mt-3 mb-2 col-lg-12 col-12">
          <button class="btn" [disabled]="registerForm.invalid">Submit</button>
        </div>
      </div>
    </form>
  </div>
</body>
